<style>
        body {
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Glassmorphism styling for goal cards */
        .glass-card {
            background: rgba(249, 250, 251, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }
        
        .glass-card.active {
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #D8FF2E; /* primary-container */
            box-shadow: 0 8px 32px rgba(216, 255, 46, 0.15);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background min-h-screen flex flex-col font-sans">
<!-- Top Navigation (Onboarding style - no main shell) -->
<header class="flex items-center justify-between px-margin-mobile h-16 w-full pt-safe sticky top-0 bg-background/90 backdrop-blur z-40">
<button aria-label="Back" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors text-on-surface">
<span class="material-symbols-outlined">chevron_left</span>
</button>
<div class="flex space-x-2">
<!-- Progress indicators -->
<div class="h-2 w-8 bg-surface-container-highest rounded-full"></div>
<div class="h-2 w-8 bg-surface-container-highest rounded-full"></div>
<div class="h-2 w-8 bg-primary-container rounded-full"></div>
<div class="h-2 w-8 bg-surface-container-highest rounded-full"></div>
</div>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<!-- Main Content -->
<main class="flex-1 px-margin-mobile py-lg max-w-[600px] mx-auto w-full flex flex-col">
<!-- Header Section -->
<div class="text-center mb-xl">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-sm">¿Cuál es tu objetivo principal?</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Esto nos ayudará a personalizar tu plan para ti.</p>
</div>
<!-- Goals List -->
<div class="flex flex-col gap-md flex-1">
<!-- Goal Option 1 (Active) -->
<label class="glass-card active rounded-lg p-md flex items-center cursor-pointer relative overflow-hidden group">
<input checked="" class="hidden" name="goal" type="radio" value="perder_peso"/>
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center mr-md shrink-0 text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">monitor_weight</span>
</div>
<div class="flex-1 pr-8">
<h3 class="font-headline-md text-headline-md text-on-surface mb-1">Perder peso</h3>
<p class="font-body-sm text-body-sm text-on-surface-variant">Quiero reducir mi peso de forma saludable</p>
</div>
<!-- Active Indicator -->
<div class="absolute right-md top-1/2 -translate-y-1/2 text-primary-container bg-inverse-surface rounded-full w-6 h-6 flex items-center justify-center">
<span class="material-symbols-outlined text-[16px] font-bold">check</span>
</div>
</label>
<!-- Goal Option 2 -->
<label class="glass-card rounded-lg p-md flex items-center cursor-pointer relative overflow-hidden group">
<input class="hidden" name="goal" type="radio" value="ganar_masa"/>
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center mr-md shrink-0 text-secondary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
</div>
<div class="flex-1">
<h3 class="font-headline-md text-headline-md text-on-surface mb-1">Ganar masa muscular</h3>
<p class="font-body-sm text-body-sm text-on-surface-variant">Quiero aumentar mi masa muscular</p>
</div>
</label>
<!-- Goal Option 3 -->
<label class="glass-card rounded-lg p-md flex items-center cursor-pointer relative overflow-hidden group">
<input class="hidden" name="goal" type="radio" value="mantenerme"/>
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center mr-md shrink-0 text-secondary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
<div class="flex-1">
<h3 class="font-headline-md text-headline-md text-on-surface mb-1">Mantenerme saludable</h3>
<p class="font-body-sm text-body-sm text-on-surface-variant">Quiero mantenerme en mi peso ideal</p>
</div>
</label>
<!-- Goal Option 4 -->
<label class="glass-card rounded-lg p-md flex items-center cursor-pointer relative overflow-hidden group">
<input class="hidden" name="goal" type="radio" value="rendimiento"/>
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center mr-md shrink-0 text-secondary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">directions_run</span>
</div>
<div class="flex-1">
<h3 class="font-headline-md text-headline-md text-on-surface mb-1">Mejorar rendimiento</h3>
<p class="font-body-sm text-body-sm text-on-surface-variant">Quiero mejorar mi rendimiento deportivo</p>
</div>
</label>

<button class="w-full bg-primary-container text-[#1C1C1C] rounded-full py-4 font-headline-md text-headline-md shadow-sm hover:opacity-90 active:scale-[0.98] transition-all">
                Continuar
            </button>

</main>
<script>
        // Simple script to handle radio button selection styling
        document.addEventListener('DOMContentLoaded', () => {
            const labels = document.querySelectorAll('label.glass-card');
            
            labels.forEach(label => {
                label.addEventListener('click', (e) => {
                    // Prevent default to allow custom styling logic
                    // We still let the input check happen naturally by bubbling
                    
                    // Reset all
                    labels.forEach(l => {
                        l.classList.remove('active');
                        // Remove checkmark if exists
                        const check = l.querySelector('.absolute.right-md');
                        if (check) check.remove();
                        
                        // Reset icon color
                        const iconContainer = l.querySelector('.w-12.h-12');
                        iconContainer.classList.remove('text-primary');
                        iconContainer.classList.add('text-secondary');
                    });
                    
                    // Set active
                    label.classList.add('active');
                    
                    // Update icon color
                    const activeIconContainer = label.querySelector('.w-12.h-12');
                    activeIconContainer.classList.remove('text-secondary');
                    activeIconContainer.classList.add('text-primary');
                    
                    // Add checkmark
                    const checkHTML = `
                        <div class="absolute right-md top-1/2 -translate-y-1/2 text-primary-container bg-inverse-surface rounded-full w-6 h-6 flex items-center justify-center">
                            <span class="material-symbols-outlined text-[16px] font-bold">check</span>
                        </div>
                    `;
                    label.insertAdjacentHTML('beforeend', checkHTML);
                });
            });
        });
    </script>
