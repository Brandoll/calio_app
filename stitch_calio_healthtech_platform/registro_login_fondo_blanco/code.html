<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Calio - Iniciar sesión</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-bright": "#fafbe6",
                    "on-tertiary": "#ffffff",
                    "tertiary-fixed": "#e3e2e2",
                    "on-secondary-fixed-variant": "#474746",
                    "on-error": "#ffffff",
                    "on-secondary-fixed": "#1b1b1b",
                    "secondary-container": "#e2dfde",
                    "surface-container-lowest": "#ffffff",
                    "on-primary-container": "#607400",
                    "tertiary": "#5e5e5f",
                    "tertiary-container": "#f0efef",
                    "on-tertiary-fixed": "#1a1c1c",
                    "surface-container-high": "#e8ead5",
                    "background": "#ffffff",
                    "on-background": "#1a1d10",
                    "outline-variant": "#c5c9ad",
                    "surface-dim": "#dadcc7",
                    "secondary": "#5f5e5e",
                    "surface-container-highest": "#e3e4d0",
                    "primary-fixed-dim": "#b2d400",
                    "outline": "#757961",
                    "on-primary": "#ffffff",
                    "on-primary-fixed": "#171e00",
                    "inverse-on-surface": "#f1f2de",
                    "surface-container-low": "#f4f5e0",
                    "surface": "#ffffff",
                    "on-tertiary-container": "#6c6c6c",
                    "surface-container": "#eeefdb",
                    "on-tertiary-fixed-variant": "#464747",
                    "inverse-surface": "#2f3224",
                    "primary": "#546500",
                    "primary-fixed": "#ccf21b",
                    "on-surface-variant": "#454933",
                    "primary-container": "#d8ff2e",
                    "error": "#ba1a1a",
                    "secondary-fixed-dim": "#c8c6c5",
                    "on-primary-fixed-variant": "#3e4c00",
                    "error-container": "#ffdad6",
                    "tertiary-fixed-dim": "#c7c6c6",
                    "surface-variant": "#e3e4d0",
                    "on-secondary": "#ffffff",
                    "on-error-container": "#93000a",
                    "on-surface": "#1a1d10",
                    "surface-tint": "#546500",
                    "inverse-primary": "#b2d400",
                    "secondary-fixed": "#e5e2e1",
                    "on-secondary-container": "#636262"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "margin-mobile": "20px",
                    "margin-desktop": "40px",
                    "gutter": "16px",
                    "base": "4px",
                    "xl": "32px",
                    "md": "16px",
                    "lg": "24px",
                    "sm": "12px",
                    "xs": "8px"
            },
            "fontFamily": {
                    "label-caps": ["Inter"],
                    "headline-lg": ["Inter"],
                    "body-sm": ["Inter"],
                    "body-lg": ["Inter"],
                    "headline-md": ["Inter"],
                    "label-md": ["Inter"],
                    "headline-lg-mobile": ["Inter"],
                    "display-lg": ["Inter"]
            },
            "fontSize": {
                    "label-caps": ["11px", {"lineHeight": "14px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                    "headline-lg": ["28px", {"lineHeight": "34px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],

                    "display-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}]

          }
        }
      }
    </script>
<style>
        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.6;
        }
        .blob-1 {
            top: -10%;
            left: -10%;
            width: 300px;
            height: 300px;
            background: #d8ff2e; /* primary-container */
            border-radius: 50%;
        }
        .blob-2 {
            bottom: -10%;
            right: -10%;
            width: 250px;
            height: 250px;
            background: #e3e4d0; /* surface-variant */
            border-radius: 50%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-white text-on-background min-h-screen relative overflow-hidden flex flex-col items-center justify-center font-body-lg">
<!-- Background Blobs -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="w-full max-w-md px-margin-mobile z-10 flex flex-col h-full justify-center pb-20 pt-10">
<!-- Logo Header -->
<div class="flex items-center justify-center space-x-2 mb-8">
<div class="w-10 h-10 bg-primary-container rounded-full flex items-center justify-center shadow-[0px_4px_20px_rgba(0,0,0,0.04)]">
<span class="material-symbols-outlined text-on-primary-fixed" style="font-variation-settings: 'FILL' 1;">local_dining</span>
</div>
<h1 class="font-display-lg text-display-lg font-bold text-primary">Calio</h1>
</div>
<!-- Typography Headline -->
<div class="text-center mb-8">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-background mb-2">¡Bienvenido de vuelta!</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Inicia sesión para continuar</p>
</div>
<!-- Login Form -->
<form class="space-y-6 w-full mb-8">
<div class="space-y-4">
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="email">Correo electrónico</label>
<div class="relative">
<input class="w-full bg-[#EDEDED] border-none rounded-[12px] py-4 px-4 font-body-lg text-on-background focus:ring-0 focus:outline-none focus:border-2 focus:border-[#1C1C1C] transition-all placeholder:text-on-surface-variant/50" id="email" placeholder="ejemplo@correo.com" type="email"/>
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="password">Contraseña</label>
<div class="relative flex items-center">
<input class="w-full bg-[#EDEDED] border-none rounded-[12px] py-4 pl-4 pr-12 font-body-lg text-on-background focus:ring-0 focus:outline-none focus:border-2 focus:border-[#1C1C1C] transition-all placeholder:text-on-surface-variant/50 tracking-widest" id="password" placeholder="••••••••••••" type="password"/>
<button class="absolute right-4 text-on-surface-variant hover:text-on-background transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<div class="text-right">
<a class="font-label-md text-label-md text-primary hover:opacity-80 transition-opacity" href="#">¿Olvidaste tu contraseña?</a>
</div>
</div>
<button class="w-full bg-primary-container text-[#1C1C1C] font-headline-md text-headline-md py-4 rounded-full hover:scale-[0.98] transition-transform shadow-[0px_4px_10px_rgba(216,255,46,0.2)]" type="submit">
                Iniciar sesión
            </button>
</form>
<!-- Divider -->
<div class="flex items-center space-x-4 mb-8">
<div class="flex-1 h-[1px] bg-tertiary-fixed"></div>
<span class="font-label-md text-label-md text-on-surface-variant">o continúa con</span>
<div class="flex-1 h-[1px] bg-tertiary-fixed"></div>
</div>
<!-- Social Logins -->
<div class="flex justify-center space-x-4 mb-10">
<button class="w-14 h-14 bg-surface-container-lowest border border-tertiary-fixed rounded-[16px] flex items-center justify-center shadow-[0px_2px_8px_rgba(0,0,0,0.02)] hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-[24px]">g_mobiledata</span>
</button>
<button class="w-14 h-14 bg-surface-container-lowest border border-tertiary-fixed rounded-[16px] flex items-center justify-center shadow-[0px_2px_8px_rgba(0,0,0,0.02)] hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-[24px]">apps</span>
</button>
<button class="w-14 h-14 bg-surface-container-lowest border border-tertiary-fixed rounded-[16px] flex items-center justify-center shadow-[0px_2px_8px_rgba(0,0,0,0.02)] hover:bg-surface-container-low transition-colors text-blue-600">
<span class="material-symbols-outlined text-[24px]">face_nod</span>
</button>
</div>
<!-- Register Link -->
<div class="text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                ¿No tienes cuenta? <a class="font-headline-md text-body-sm text-primary hover:opacity-80 transition-opacity ml-1" href="#">Regístrate</a>
</p>
</div>
</div>
</body></html>
