<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Calio - Hidratación</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                            "surface-bright": "#fafbe6",
                            "on-tertiary": "#ffffff",
                            "tertiary-fixed": "#e3e2e2",
                            "on-secondary-fixed-variant": "#474746",
                            "on-error": "#ffffff",
                            "on-secondary-fixed": "#1b1b1b",
                            "secondary-container": "#e2dfde",
                            "surface-container-lowest": "#ffffff",
                            "on-primary-container": "#607400",
                            "tertiary": "#5e5e5f",
                            "tertiary-container": "#f0efef",
                            "on-tertiary-fixed": "#1a1c1c",
                            "surface-container-high": "#e8ead5",
                            "background": "#ffffff",
                            "on-background": "#1a1d10",
                            "outline-variant": "#c5c9ad",
                            "surface-dim": "#dadcc7",
                            "secondary": "#5f5e5e",
                            "surface-container-highest": "#e3e4d0",
                            "primary-fixed-dim": "#b2d400",
                            "outline": "#757961",
                            "on-primary": "#ffffff",
                            "on-primary-fixed": "#171e00",
                            "inverse-on-surface": "#f1f2de",
                            "surface-container-low": "#f4f5e0",
                            "surface": "#fafbe6",
                            "on-tertiary-container": "#6c6c6c",
                            "surface-container": "#eeefdb",
                            "on-tertiary-fixed-variant": "#464747",
                            "inverse-surface": "#2f3224",
                            "primary": "#546500",
                            "primary-fixed": "#ccf21b",
                            "on-surface-variant": "#454933",
                            "primary-container": "#d8ff2e",
                            "error": "#ba1a1a",
                            "secondary-fixed-dim": "#c8c6c5",
                            "on-primary-fixed-variant": "#3e4c00",
                            "error-container": "#ffdad6",
                            "tertiary-fixed-dim": "#c7c6c6",
                            "surface-variant": "#e3e4d0",
                            "on-secondary": "#ffffff",
                            "on-error-container": "#93000a",
                            "on-surface": "#1a1d10",
                            "surface-tint": "#546500",
                            "inverse-primary": "#b2d400",
                            "secondary-fixed": "#e5e2e1",
                            "on-secondary-container": "#636262"
                    },
                    "borderRadius": {
                            "DEFAULT": "1rem",
                            "lg": "2rem",
                            "xl": "3rem",
                            "full": "9999px"
                    },
                    "spacing": {
                            "margin-mobile": "20px",
                            "margin-desktop": "40px",
                            "gutter": "16px",
                            "base": "4px",
                            "xl": "32px",
                            "md": "16px",
                            "lg": "24px",
                            "sm": "12px",
                            "xs": "8px"
                    },
                    "fontFamily": {
                            "label-caps": ["Inter"],
                            "headline-lg": ["Inter"],
                            "body-sm": ["Inter"],
                            "body-lg": ["Inter"],
                            "headline-md": ["Inter"],
                            "label-md": ["Inter"],
                            "headline-lg-mobile": ["Inter"],
                            "display-lg": ["Inter"]
                    },
                    "fontSize": {
                            "label-caps": ["11px", {"lineHeight": "14px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                            "headline-lg": ["28px", {"lineHeight": "34px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                            "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                            "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                            "headline-md": ["20px", {"lineHeight": "26px", "fontWeight": "600"}],
                            "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                            "headline-lg-mobile": ["24px", {"lineHeight": "30px", "fontWeight": "700"}],
                            "display-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
                    }
                }
            }
        }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
        }
        
        .water-wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: #b2d400; /* Primary fixed dim mapped to water for this brand */
            border-radius: 0 0 1rem 1rem;
            animation: wave 4s ease-in-out infinite alternate;
            opacity: 0.8;
        }

        @keyframes wave {
            0% { transform: scaleY(0.9) translateY(5px); border-radius: 40% 60% 1rem 1rem; }
            50% { transform: scaleY(1.0) translateY(0px); border-radius: 60% 40% 1rem 1rem; }
            100% { transform: scaleY(0.95) translateY(2px); border-radius: 50% 50% 1rem 1rem; }
        }
        
        .progress-ring__circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background font-body-lg antialiased min-h-screen flex flex-col items-center">
<!-- Top Navigation (Task-focused context, but keeping header for brand presence) -->
<header class="w-full max-w-[480px] h-16 flex items-center justify-between px-margin-mobile bg-transparent sticky top-0 z-40">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-highest hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-on-surface">Hidratación</h1>
<div class="w-10 h-10"></div> <!-- Spacer for center alignment -->
</header>
<!-- Main Content Area -->
<main class="flex-1 w-full max-w-[480px] px-margin-mobile flex flex-col gap-6 pb-32 pt-4 relative">
<!-- Ambient Background Glow -->
<div class="absolute top-10 left-1/2 -translate-x-1/2 w-[300px] h-[300px] bg-primary-container rounded-full blur-[100px] opacity-10 -z-10 pointer-events-none"></div>
<!-- Main Visual Card -->
<section class="glass-card rounded-3xl p-6 flex flex-col items-center text-center relative overflow-hidden">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile mb-2">Hoy llevas</h2>
<div class="font-display-lg text-display-lg text-primary flex items-baseline gap-2 mb-1">
                4 <span class="font-headline-md text-headline-md text-on-surface-variant">vasos</span>
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant mb-8">Meta diaria: 8 vasos (2000 ml)</p>
<!-- Water Glass/Bottle Visualization -->
<div class="relative w-40 h-56 mx-auto mb-8">
<!-- Outer Glass Container -->
<div class="absolute inset-0 border-4 border-black/10 rounded-t-lg rounded-b-2xl bg-black/5 backdrop-blur-sm shadow-inner overflow-hidden flex flex-col justify-end">
<!-- The Liquid -->
<div class="relative w-full h-[50%] bg-gradient-to-t from-primary to-primary-fixed-dim transition-all duration-1000 ease-in-out">
<!-- Animated Top Surface of Liquid -->
<div class="absolute top-0 left-0 w-full h-4 bg-primary-container/40 rounded-[50%] -translate-y-1/2 scale-x-110"></div>
<!-- Bubbles -->
<div class="absolute bottom-2 left-4 w-2 h-2 bg-white/40 rounded-full animate-bounce"></div>
<div class="absolute bottom-6 right-6 w-3 h-3 bg-white/30 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
<div class="absolute bottom-12 left-1/2 w-1.5 h-1.5 bg-white/50 rounded-full animate-bounce" style="animation-delay: 0.5s"></div>
</div>
</div>
<!-- Measurement Marks -->
<div class="absolute left-[-20px] top-4 text-xs text-on-surface-variant">100%</div>
<div class="absolute left-[-20px] top-1/2 -translate-y-1/2 text-xs text-on-surface-variant">50%</div>
<div class="absolute left-[-20px] bottom-2 text-xs text-on-surface-variant">0%</div>
<!-- Decorative Straw or Details could go here -->
</div>
<!-- Primary Action -->
<button class="w-full bg-primary-container text-on-primary-fixed font-headline-md text-headline-md py-4 rounded-full flex items-center justify-center gap-2 shadow-sm hover:scale-[1.02] active:scale-95 transition-all mb-4">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add</span>
                Agregar vaso
            </button>
<button class="text-primary font-label-md text-label-md hover:underline bg-transparent border-none">
                Ajustar meta diaria
            </button>
</section>
<!-- Stats/History Bento Grid -->
<div class="grid grid-cols-2 gap-4">
<!-- Weekly Progress Ring -->
<div class="glass-card rounded-2xl p-4 flex flex-col items-center justify-center gap-3">
<p class="font-label-md text-label-md text-on-surface-variant w-full text-left">Progreso semanal</p>
<div class="relative w-24 h-24 flex items-center justify-center">
<svg class="w-24 h-24" viewbox="0 0 100 100">
<circle class="text-surface-container-highest stroke-current" cx="50" cy="50" fill="transparent" r="40" stroke-width="8"></circle>
<circle class="text-primary stroke-current progress-ring__circle" cx="50" cy="50" fill="transparent" r="40" stroke-dasharray="251.2" stroke-dashoffset="62.8" stroke-linecap="round" stroke-width="8"></circle> <!-- 75% filled -->
</svg>
<div class="absolute font-headline-md text-headline-md text-on-surface">75%</div>
</div>
<p class="font-label-caps text-label-caps text-tertiary">Promedio bueno</p>
</div>
<!-- History Summary -->
<div class="glass-card rounded-2xl p-4 flex flex-col justify-between">
<div class="flex justify-between items-start w-full">
<span class="material-symbols-outlined text-primary bg-primary-container/20 p-2 rounded-full">history</span>
<button class="font-label-md text-label-md text-primary hover:underline">Ver historial</button>
</div>
<div>
<h3 class="font-body-sm text-body-sm text-on-surface-variant mt-4">Último registro</h3>
<p class="font-headline-md text-headline-md text-on-surface mt-1">Hace 2 hrs</p>
<p class="font-label-caps text-label-caps text-tertiary mt-2">1 Vaso (250ml)</p>
</div>
</div>
</div>
</main>
</body></html>
